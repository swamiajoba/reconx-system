# =============================================================================
# dev profile: H2 in-memory + Kafka can be disabled if not running
# =============================================================================
spring:
  datasource:
    # H2 PostgreSQL-compat mode. NON_KEYWORDS=USER lets us name a JPA entity
    # `users` without H2 treating it as a reserved word; CASE_INSENSITIVE_IDENTIFIERS
    # lets CSV column names match the unquoted Liquibase column declarations.
    url: jdbc:h2:mem:reconx;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2

  # H2 doesn't ship a JSONB type — Liquibase preconditions in the changelog skip
  # the JSONB GIN-index step on H2 (see 003-jsonb.xml).
  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    listener:
      missing-topics-fatal: false   # don't blow up if Kafka isn't running locally

logging:
  level:
    com.dbtraining.reconx: DEBUG
